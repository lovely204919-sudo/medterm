<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedTerm 의료용어사전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0B1623;color:#DDE6F5;font-family:"Noto Sans KR",-apple-system,sans-serif;min-height:100vh}
input,button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
/* header */
#hdr{background:#111D2C;border-bottom:1px solid rgba(255,255,255,.07);padding:12px 16px;position:sticky;top:0;z-index:50}
.hi{max-width:1100px;margin:0 auto}
.hr1{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{font-size:16px;font-weight:700;color:#00BFA6;white-space:nowrap;flex-shrink:0}
.logos{font-size:10px;color:#6B82A4;font-weight:300;margin-left:5px}
.sw{position:relative;flex:1;min-width:0}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.sw input{width:100%;padding:9px 12px 9px 32px;border-radius:9px;background:#162030;border:1px solid rgba(255,255,255,.12);color:#DDE6F5;font-size:14px;outline:none;-webkit-appearance:none}
.sw input:focus{border-color:#00BFA6}
.sw input::placeholder{color:#6B82A4}
#cnt{font-size:11px;color:#6B82A4;white-space:nowrap;flex-shrink:0}
#tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#A0B4CC;white-space:nowrap;flex-shrink:0;cursor:pointer}
.tab.on{color:#fff;font-weight:600;border-color:transparent}
/* body */
#body{max-width:1100px;margin:0 auto;padding:14px 14px 80px;display:flex;flex-direction:column}
/* sidebar */
#sb{display:none}
.sbt{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6B82A4;margin-bottom:8px;padding-left:4px}
.sbr{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;border-radius:8px;cursor:pointer;font-size:12.5px;margin-bottom:2px}
.sbl{display:flex;align-items:center;gap:7px}
.sbd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sbn{font-size:10px;background:#162030;padding:1px 6px;border-radius:100px;color:#6B82A4}
/* list */
#list{min-width:0}
/* card */
.card{background:#111D2C;border-radius:12px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07)}
.chd{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.cm{flex:1;min-width:0}
.ctop{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.ckr{font-size:15px;font-weight:700;line-height:1.2}
.csub{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cen{font-size:11.5px;color:#6B82A4}
.cprev{font-size:11.5px;color:#6B82A4;margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cr{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:4px}
.pill{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:600;white-space:nowrap}
.chev{font-size:10px;color:#6B82A4;transition:transform .2s;display:inline-block;flex-shrink:0}
.chev.op{transform:rotate(180deg)}
/* detail */
.det{border-top:1px solid rgba(255,255,255,.06)}
.dg{display:grid;grid-template-columns:1fr}
.ds{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.ds.fl{grid-column:1/-1}
.dt{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6B82A4;margin-bottom:8px}
.sr{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;line-height:1.6;margin-bottom:5px}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}
.nr{display:flex;gap:8px;align-items:flex-start;background:#162030;border-radius:7px;padding:8px 10px;font-size:12px;line-height:1.6;margin-bottom:5px}
.nn{font-family:monospace;font-size:10px;flex-shrink:0;padding-top:2px}
.lbs{display:flex;flex-wrap:wrap;gap:5px}
.lb{font-family:monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:#162030;border:1px solid rgba(255,255,255,.12);color:#DDE6F5}
.note{background:rgba(245,166,35,.13);border-left:3px solid #F5A623;border-radius:0 7px 7px 0;padding:10px 13px;font-size:12.5px;line-height:1.75}
.rels{display:flex;flex-wrap:wrap;gap:6px}
.rel{font-size:12px;padding:4px 10px;border-radius:100px;background:#162030;border:1px solid rgba(255,255,255,.12);color:#6B82A4;cursor:pointer;display:inline-block}
/* not-found */
.nfp{background:#111D2C;border-radius:12px;border:1px solid rgba(255,255,255,.1);padding:16px;margin-bottom:10px}
.nft{font-size:12px;color:#6B82A4;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.nfl{display:flex;flex-wrap:wrap;gap:8px}
.nfa{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600}
.empty{text-align:center;padding:60px 20px;color:#6B82A4;font-size:14px}
/* tablet+ */
@media(min-width:700px){
  #hdr{padding:14px 24px}
  #body{padding:18px 24px 80px;flex-direction:row;align-items:flex-start;gap:18px}
  #sb{display:block;width:190px;flex-shrink:0;position:sticky;top:108px;background:#111D2C;border-radius:12px;border:1px solid rgba(255,255,255,.07);padding:12px}
  #list{flex:1}
  .dg{grid-template-columns:1fr 1fr}
  .ds:nth-child(odd):not(.fl){border-right:1px solid rgba(255,255,255,.06)}
}
</style>
</head>
<body>

<div id="hdr">
  <div class="hi">
    <div class="hr1">
      <span class="logo">MedTerm<span class="logos">의료용어사전</span></span>
      <div class="sw">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6B82A4" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="qi" type="search" placeholder="한글, 영어, 약어 검색 (갑상샘, DVT, ARDS...)">
      </div>
      <span id="cnt"></span>
    </div>
    <div id="tabs"></div>
  </div>
</div>

<div id="body">
  <aside id="sb"></aside>
  <div id="list"></div>
</div>

    var q = encodeURIComponent(curQ);
    var items = [
      {n:"KMLE",    d:"의학용어사전", col:"#4A9EF5", bg:"rgba(74,158,245,0.12)",  url:"https://www.kmle.co.kr/search.php?SearchString=" + q, ic:"🔬"},
      {n:"Claude",  d:"AI 의학 설명", col:"#CC785C", bg:"rgba(204,120,92,0.12)",  url:"https://claude.ai/new?q=" + q,                        ic:"✦"},
      {n:"ChatGPT", d:"AI 의학 설명", col:"#10A37F", bg:"rgba(16,163,127,0.12)", url:"https://chatgpt.com/?q=" + q,                          ic:"✦"},
      {n:"Google",  d:"의학 검색",    col:"#9B7EF5", bg:"rgba(155,126,245,0.12)", url:"https://www.google.com/search?q=" + q + "+%EC%9D%98%ED%95%99%EC%9A%A9%EC%96%B4", ic:"🔍"}
    ];
    var btns = items.map(function(l) {
      return '<a href="' + l.url + '" target="_blank" class="nfa" style="background:' + l.bg + ';border:1px solid ' + l.col + '55;color:' + l.col + '">'
        + l.ic + ' ' + l.n + ' <small style="opacity:.7;font-size:10px;font-weight:400">' + l.d + '</small> ↗</a>';
    }).join("");
    return '<div class="nfp"><div class="nft">🔎 "' + esc(curQ) + '" — DB에 없습니다. 외부에서 검색하세요</div><div class="nfl">' + btns + '</div></div>';
  }

  // ── 렌더 ──
  function render() {
    var list = filtered();
    document.getElementById("cnt").textContent = list.length + "개";

    // tabs
    document.getElementById("tabs").innerHTML = CATS.map(function(item) {
      var on = curCat === item.c;
      return '<button class="tab' + (on ? " on" : "") + '" data-cat="' + item.c + '" style="'
        + (on ? "background:" + item.col + "44;border-color:transparent" : "") + '">' + item.kr + '</button>';
    }).join("");

    // sidebar
    document.getElementById("sb").innerHTML = '<div class="sbt">카테고리</div>'
      + CATS.map(function(item) {
          var on = curCat === item.c;
          var cnt = item.c === "all" ? DB.length : DB.filter(function(t) { return t.cat === item.c; }).length;
          return '<div class="sbr" data-cat="' + item.c + '" style="background:' + (on ? "#1C2A3D" : "transparent")
            + ';color:' + (on ? "#DDE6F5" : "#6B82A4") + ';font-weight:' + (on ? 600 : 400) + '">'
            + '<div class="sbl"><div class="sbd" style="background:' + item.col + '"></div><span>' + item.kr + '</span></div>'
            + '<span class="sbn">' + cnt + '</span></div>';
      }).join("");

    // list
    var html = "";
    if (showNF && curQ && list.length === 0) html += nfHTML();
    html += list.map(cardHTML).join("");
    if (!showNF && list.length === 0 && curQ) html = '<div class="empty">검색 결과가 없습니다</div>';
    document.getElementById("list").innerHTML = html;
  }

  // ── 이벤트 (event delegation — inline onclick 없음) ──
  document.addEventListener("click", function(ev) {
    var el = ev.target;

    // 카드 헤더 클릭 → 열기/닫기
    var chd = el.closest ? el.closest(".chd") : null;
    if (chd) {
      var card = chd.closest(".card");
      if (card) {
        var id = parseInt(card.getAttribute("data-id"), 10);
        openId = (openId === id) ? null : id;
        render();
        return;
      }
    }

    // 관련 용어 클릭
    if (el.classList && el.classList.contains("rel")) {
      var term = el.getAttribute("data-rel");
      if (term) { doSearch(term); return; }
    }

    // 탭 / 사이드바 카테고리 클릭
    var catEl = el.closest ? el.closest("[data-cat]") : null;
    if (catEl) {
      curCat = catEl.getAttribute("data-cat");
      showNF = false;
      openId = null;
      render();
    }
  });

  // 검색창
  document.getElementById("qi").addEventListener("input", function() {
    clearTimeout(debT);
    curQ   = this.value;
    showNF = false;
    openId = null;
    render();
    if (!curQ.trim()) return;
    var val = curQ;
    debT = setTimeout(function() {
      var q = val.toLowerCase();
      var hits = DB.filter(function(t) {
        return t.kr.indexOf(q) >= 0 || t.en.toLowerCase().indexOf(q) >= 0
          || t.abbr.toLowerCase().indexOf(q) >= 0 || t.def.indexOf(q) >= 0;
      });
      if (hits.length === 0) { showNF = true; render(); }
    }, 500);
  });

  function doSearch(term) {
    curQ   = term;
    curCat = "all";
    showNF = false;
    openId = null;
    document.getElementById("qi").value = term;
    render();
    var q = term.toLowerCase();
    var hits = DB.filter(function(t) {
      return t.kr.indexOf(q) >= 0 || t.en.toLowerCase().indexOf(q) >= 0;
    });
    if (hits.length === 0) {
      clearTimeout(debT);
      debT = setTimeout(function() { showNF = true; render(); }, 300);
    }
    window.scrollTo({top: 0, behavior: "smooth"});
  }

  render();
})();
</script>

</body>
</html>
